<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Create Account | My Provider</title>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text: #1e293b; } /* 登録は緑基調 */
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; }
        .error { background: #fee2e2; color: #b91c1c; padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <div id="error-box"></div>
        <form action="/register" method="post">
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" name="display_name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="johndoe123">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div class="footer">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            const box = document.getElementById('error-box');
            box.className = 'error';
            box.innerText = 'Registration failed. Username might be taken.';
        }
    </script>
</body>
</html>
