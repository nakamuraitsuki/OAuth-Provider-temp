services:
  app:
    build: .
    ports:
      - "127.0.0.2:8080:8080"
    environment:
      - ADDRESS=0.0.0.0:8080
      - ISSUER_URL=http://127.0.0.2:8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=oauth_db
      - DB_SSLMODE=disable
      - COOKIE_SECRET=very-secret-string
    depends_on:
      db:
        condition: service_healthy

  db:
    image: library/postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=oauth_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5